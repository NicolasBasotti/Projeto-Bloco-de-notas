<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <title>Bloco de Notas</title>
</head>
<body>
    <div class="cabecalho">
        <p> Bloco de Notas</p>
    </div>
    <div class="container">
        <div class="div-input">
            <input id="input-principal" placeholder="O que tenho que fazer">
            <div class="div-botoes-input">
                <button class="botao-input botao-adicionar botao-hover" id="botao-adicionar">Adicionar</button>
                <button class="botao-input botao-limpar botao-hover" id="botao-limpar">Limpar tudo</button>
            </div>
        </div>
            <ul id="tarefas">

            </ul> 
    </div>
    <dialog id="modal">
        <div class="modal-edit">
                <div class="modal-header">
                    <H2>Editar tarefa</H2>
                </div>
                <div class="modal-body">
                    <textarea id="editar-tarefa" rows="1" minlength="1" placeholder="Alterando tarefa..."></textarea> 
                </div>
                <div class="modal-footer">
                    <button class="button-modal button-cancelar hover-modal">Cancelar</button>
                    <button class="button-modal button-salvar hover-modal">Salvar</button>
                </div>
        </div>
    </dialog>
  
    <script src="scripts.js"></script>
</body>
</html>
